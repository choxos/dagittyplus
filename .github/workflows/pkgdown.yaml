# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Build the pkgdown documentation site and publish it at the gh-pages root
# (https://choxos.github.io/dagittyplus/). The browser app lives on the separate
# `webapp` branch and is published into gh-pages /app by its own deploy-app
# workflow; this workflow deploys with clean: false so it overlays the root and
# never deletes the /app subtree.
on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE, dest_dir = "docs")
        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
